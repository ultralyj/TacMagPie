<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Tactile Sensor Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        
        h1 {
            color: #60a5fa;
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .visualization-section {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .section-title {
            color: #60a5fa;
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }
        
        .sensor-container {
            width: 100%;
            height: 600px;
            position: relative;
            background-color: #0f172a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        
        #sensor-canvas {
            width: 100%;
            height: 100%;
        }
        
        .connection-panel {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .connected {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        
        .disconnected {
            background-color: #ef4444;
        }
        
        .connection-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        input[type="text"] {
            flex-grow: 1;
            padding: 12px 15px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #e2e8f0;
            min-width: 200px;
        }
        
        button {
            padding: 12px 24px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        
        button:hover {
            background-color: #2563eb;
        }
        
        .disconnect-btn {
            background-color: #ef4444;
        }
        
        .disconnect-btn:hover {
            background-color: #dc2626;
        }
        
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .view-controls {
            display: flex;
            gap: 10px;
        }
        
        .control-button {
            padding: 10px 20px;
            background-color: #475569;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        
        .control-button:hover {
            background-color: #64748b;
        }
        
        .control-button.active {
            background-color: #3b82f6;
        }
        
        .legend {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .sensor-color {
            background-color: #ffff00;
        }
        
        .magnetic-color {
            background-color: #00ff00;
        }
        
        .sensor-base-color {
            background-color: #00501f;
        }
        
        @media (max-width: 768px) {
            .sensor-container {
                height: 400px;
            }
            
            .controls-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        
        <div class="main-content">
            <section class="visualization-section">
                <h2 class="section-title">TacMagPie Visualization</h2>
                <div class="sensor-container">
                    <canvas id="sensor-canvas"></canvas>
                </div>
                
                <div class="controls-row">
                    <div class="view-controls">
                        <button id="view-front" class="control-button active">Front View</button>
                        <button id="view-top" class="control-button">Top View</button>
                        <button id="view-side" class="control-button">Side View</button>
                        <button id="view-reset" class="control-button">Reset View</button>
                    </div>
                </div>
                
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color sensor-color"></div>
                        <span>Hall Effect Sensors</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color magnetic-color"></div>
                        <span>Magnetic Field Direction</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color sensor-base-color"></div>
                        <span>Sensor Base</span>
                    </div>
                </div>
            </section>
            
            <section class="connection-panel">
                <h2 class="section-title">Connection Settings</h2>
                
                <div class="connection-status">
                    <div class="status-indicator disconnected" id="status-indicator"></div>
                    <span id="status-text">Disconnected from data source</span>
                </div>
                
                <div class="connection-controls">
                    <input type="text" id="ws-url" value="ws://localhost:8765" placeholder="WebSocket URL">
                    <button id="connect-btn">Connect</button>
                    <button id="disconnect-btn" class="disconnect-btn" disabled>Disconnect</button>
                    <button id="simulate-btn">Simulate Data</button>
                </div>
            </section>
        </div>
    </div>

    <script>
        // Three.js for 3D visualization
        let scene, camera, renderer;
        let sensorCube, hallSensors = [];
        let arrows = [];
        
        // WebSocket connection
        let socket = null;
        let isSimulating = false;
        let simulationInterval = null;
        
        // Sensor color (all sensors use the same cyan color)
        const sensorColor = 0xffff00;
        
        // Sensor positions (relative to center of main cube)
        // Flat sensor dimensions: width=1, height=1, depth=0.2
        const sensorPositions = [
            { x: -0.3, y: 0.3, z: 0.1 },   // Top-left (front face)
            { x: 0.3, y: 0.3, z: 0.1 },    // Top-right (front face)
            { x: 0, y: 0, z: 0.1 },        // Center (front face)
            { x: -0.3, y: -0.3, z: 0.1 },  // Bottom-left (front face)
            { x: 0.3, y: -0.3, z: 0.1 }    // Bottom-right (front face)
        ];
        
        // Camera views
        const cameraViews = {
            front: { position: { x: 0, y: 0, z: 2 }, target: { x: 0, y: 0, z: 0 } },
            top: { position: { x: 0, y: 2, z: 0 }, target: { x: 0, y: 0, z: 0 } },
            side: { position: { x: 2, y: 0, z: 0 }, target: { x: 0, y: 0, z: 0 } }
        };
        
        // Initialize 3D scene
        function init3DScene() {
            const canvas = document.getElementById('sensor-canvas');
            
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            
            // Create camera
            camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(cameraViews.front.position.x, cameraViews.front.position.y, cameraViews.front.position.z);
            camera.lookAt(cameraViews.front.target.x, cameraViews.front.target.y, cameraViews.front.target.z);
            
            // Create renderer
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // Add lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);
            
            // Create main tactile sensor - flat rectangular box
            const boxGeometry = new THREE.BoxGeometry(1, 1, 0.2); // Flat sensor
            const boxMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x00501f, 
                transparent: true, 
                opacity: 0.5,
                wireframe: false
            });
            sensorCube = new THREE.Mesh(boxGeometry, boxMaterial);
            scene.add(sensorCube);
            
            // Add wireframe to see edges
            const wireframe = new THREE.LineSegments(
                new THREE.EdgesGeometry(boxGeometry),
                new THREE.LineBasicMaterial({ color: 0x64748b })
            );
            sensorCube.add(wireframe);
            
            // Create Hall sensors (small cubes at corners and center)
            const sensorGeometry = new THREE.BoxGeometry(0.2, 0.2, 0.08);
            const sensorMaterial = new THREE.MeshPhongMaterial({ color: sensorColor });
            
            for (let i = 0; i < 5; i++) {
                const sensor = new THREE.Mesh(sensorGeometry, sensorMaterial);
                
                sensor.position.set(sensorPositions[i].x, sensorPositions[i].y, sensorPositions[i].z);
                sensorCube.add(sensor);
                hallSensors.push(sensor);
                
                // Create arrow helper for each sensor (initially zero length)
                const direction = new THREE.Vector3(0, 0, 1);
                const length = 0.1;
                const arrowColor = 0x00ff00;
                
                const arrow = new THREE.ArrowHelper(direction, new THREE.Vector3(0, 0, 0), length, arrowColor, 0.03, 0.05);
                
                arrow.position.copy(sensor.position);
                sensorCube.add(arrow);
                arrows.push(arrow);
                
            }
            
            // Add coordinate axes
            const axesHelper = new THREE.AxesHelper(1);
            scene.add(axesHelper);
            
            // Add grid helper
            const gridHelper = new THREE.GridHelper(2, 20, 0x475569, 0x334155);
            gridHelper.rotation.x = Math.PI / 2;
            scene.add(gridHelper);
            
            // Start animation loop
            animate();
            
            // Handle window resize
            window.addEventListener('resize', onWindowResize);
            
            // Set up view controls
            setupViewControls();
        }
        
        // Set up view control buttons
        function setupViewControls() {
            const frontBtn = document.getElementById('view-front');
            const topBtn = document.getElementById('view-top');
            const sideBtn = document.getElementById('view-side');
            const resetBtn = document.getElementById('view-reset');
            
            frontBtn.addEventListener('click', () => {
                setCameraView('front');
                setActiveButton(frontBtn);
            });
            
            topBtn.addEventListener('click', () => {
                setCameraView('top');
                setActiveButton(topBtn);
            });
            
            sideBtn.addEventListener('click', () => {
                setCameraView('side');
                setActiveButton(sideBtn);
            });
            
            resetBtn.addEventListener('click', () => {
                setCameraView('front');
                setActiveButton(frontBtn);
            });
        }
        
        // Set camera to a specific view
        function setCameraView(view) {
            if (!cameraViews[view]) return;
            
            const targetView = cameraViews[view];
            camera.position.set(targetView.position.x, targetView.position.y, targetView.position.z);
            camera.lookAt(targetView.target.x, targetView.target.y, targetView.target.z);
        }
        
        // Set active button for view controls
        function setActiveButton(activeBtn) {
            const buttons = document.querySelectorAll('.control-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            activeBtn.classList.add('active');
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            // No rotation - sensor stays fixed
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        function onWindowResize() {
            const canvas = document.getElementById('sensor-canvas');
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        }
        
        // Update sensor arrows based on magnetic field data
        function updateSensorArrows(data) {
            for (let i = 0; i < 5; i++) {
                const prefix = `B${i+1}`;
                const bx = data[`${prefix}x`] || 0;
                const by = data[`${prefix}y`] || 0;
                const bz = data[`${prefix}z`] || 0;
                
                // Calculate magnitude
                const magnitude = Math.sqrt(bx*bx + by*by + bz*bz);
                
                // Calculate direction (normalized vector)
                const direction = new THREE.Vector3(bx, by, bz).normalize();
                
                arrows[i].setDirection(direction);
                arrows[i].setLength(Math.min(magnitude * 0.5, 0.8), 0.2, 0.1);
            }
        }
        
        // WebSocket connection
        function connectWebSocket() {
            const url = document.getElementById('ws-url').value;
            
            if (socket && socket.readyState === WebSocket.OPEN) {
                alert('Already connected to WebSocket server');
                return;
            }
            
            stopSimulation(); // Stop simulation if running
            
            socket = new WebSocket(url);
            
            socket.onopen = function() {
                updateConnectionStatus(true, `Connected to ${url}`);
                document.getElementById('connect-btn').disabled = true;
                document.getElementById('disconnect-btn').disabled = false;
            };
            
            socket.onmessage = function(event) {
                try {
                    console.log('Received data:', event.data);
                    const data = JSON.parse(event.data);
                    updateSensorArrows(data);
                } catch (error) {
                    console.error('Error parsing WebSocket data:', error);
                }
            };
            
            socket.onclose = function() {
                updateConnectionStatus(false, 'Disconnected from data source');
                document.getElementById('connect-btn').disabled = false;
                document.getElementById('disconnect-btn').disabled = true;
            };
            
            socket.onerror = function(error) {
                updateConnectionStatus(false, `Connection error: ${error.message || 'Unknown error'}`);
                document.getElementById('connect-btn').disabled = false;
                document.getElementById('disconnect-btn').disabled = true;
            };
        }
        
        // Disconnect WebSocket
        function disconnectWebSocket() {
            if (socket) {
                socket.close();
                socket = null;
            }
            
            document.getElementById('connect-btn').disabled = false;
            document.getElementById('disconnect-btn').disabled = true;
        }
        
        // Update connection status
        function updateConnectionStatus(connected, message) {
            const indicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            
            if (connected) {
                indicator.className = 'status-indicator connected';
                statusText.textContent = message;
            } else {
                indicator.className = 'status-indicator disconnected';
                statusText.textContent = message;
            }
        }
        
        // Generate simulated data
        function generateSimulatedData() {
            const data = {};
            
            for (let i = 1; i <= 5; i++) {
                // Generate random magnetic field values
                const bx = (Math.random() - 0.5) * 2;
                const by = (Math.random() - 0.5) * 2;
                const bz = (Math.random() - 0.5) * 2;
                
                data[`B${i}x`] = bx;
                data[`B${i}y`] = by;
                data[`B${i}z`] = bz;
            }
            
            return data;
        }
        
        // Start simulation
        function startSimulation() {
            if (isSimulating) return;
            
            stopSimulation(); // Stop any existing simulation
            
            isSimulating = true;
            updateConnectionStatus(true, 'Simulating sensor data');
            document.getElementById('connect-btn').disabled = true;
            document.getElementById('disconnect-btn').disabled = false;
            
            // Initial update
            const initialData = generateSimulatedData();
            updateSensorArrows(initialData);
            
            // Update at intervals
            simulationInterval = setInterval(() => {
                const simulatedData = generateSimulatedData();
                updateSensorArrows(simulatedData);
            }, 500);
        }
        
        // Stop simulation
        function stopSimulation() {
            if (simulationInterval) {
                clearInterval(simulationInterval);
                simulationInterval = null;
            }
            
            isSimulating = false;
            
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                updateConnectionStatus(false, 'Disconnected from data source');
                document.getElementById('connect-btn').disabled = false;
                document.getElementById('disconnect-btn').disabled = true;
            }
        }
        
        // Initialize the application
        function init() {
            // Initialize 3D visualization
            init3DScene();
            
            // Set up event listeners
            document.getElementById('connect-btn').addEventListener('click', connectWebSocket);
            document.getElementById('disconnect-btn').addEventListener('click', disconnectWebSocket);
            document.getElementById('simulate-btn').addEventListener('click', startSimulation);
            
            // Add Enter key support for WebSocket URL
            document.getElementById('ws-url').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    connectWebSocket();
                }
            });
        }
        
        // Initialize when page loads
        window.addEventListener('load', init);
    </script>
    
    <!-- Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</body>
</html>
